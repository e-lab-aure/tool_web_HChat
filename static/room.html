<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HChat - Room</title>
  <script src="/static/crypto.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0b;
      --surface:     #111113;
      --surface2:    #18181b;
      --surface3:    #222226;
      --border:      rgba(255,255,255,.07);
      --accent:      #6366f1;
      --accent-soft: rgba(99,102,241,.15);
      --text:        #f0f0f2;
      --muted:       #6b6b78;
      --danger:      #f87171;
      --success:     #4ade80;
      --radius:      14px;
      --spring:      cubic-bezier(.34,1.56,.64,1);
      --sidebar-w:   240px;
      --header-h:    56px;
      --input-h:     72px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Ecran d'authentification                                            */
    /* ------------------------------------------------------------------ */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }
    #auth-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 10%, rgba(99,102,241,.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 1;
      animation: fadeUp .4s var(--spring) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .auth-card h2 { font-size: 20px; font-weight: 700; }
    .auth-card p  { font-size: 13px; color: var(--muted); }
    .auth-field { display: flex; flex-direction: column; gap: 8px; }
    .auth-field label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .auth-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .auth-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .auth-field input::placeholder { color: var(--muted); }
    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s var(--spring), opacity .15s;
    }
    .auth-btn:hover  { opacity: .9; }
    .auth-btn:active { transform: scale(.97); }
    .auth-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    /* Badge mode crypto (discret, informatif) */
    .crypto-badge {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .crypto-badge span {
      background: rgba(99,102,241,.1);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
    }
    .auth-error {
      font-size: 13px;
      color: var(--danger);
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      border-radius: 8px;
      padding: 10px 12px;
      display: none;
    }
    .auth-error.visible { display: block; }

    /* ------------------------------------------------------------------ */
    /* Layout principal (masque jusqu'a authentification)                 */
    /* ------------------------------------------------------------------ */
    #app { display: none; flex: 1; overflow: hidden; }
    #app.visible { display: flex; }

    /* En-tete */
    header {
      height: var(--header-h);
      background: rgba(17,17,19,.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 16px; height: 16px; fill: #fff; }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
    }
    .header-room-id {
      font-family: monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      transition: background .2s;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .header-room-id:hover { background: var(--surface3); }
    .header-room-id.copied { color: var(--success); border-color: rgba(74,222,128,.3); }

    /* Bouton partager */
    .btn-icon {
      width: 32px; height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-icon:hover { background: var(--surface3); }
    .btn-icon svg { width: 15px; height: 15px; stroke: var(--muted); }

    /* Bouton detruire la room */
    .btn-icon.danger:hover { background: rgba(248,113,113,.1); }
    .btn-icon.danger:hover svg { stroke: var(--danger); }

    /* ------------------------------------------------------------------ */
    /* Corps de l'application                                             */
    /* ------------------------------------------------------------------ */
    .layout {
      display: flex;
      flex: 1;
      margin-top: var(--header-h);
      height: calc(100dvh - var(--header-h));
    }

    /* Sidebar */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-section {
      padding: 14px 14px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    #user-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
      scrollbar-width: none;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      transition: background .15s;
      animation: fadeUser .3s var(--spring) both;
    }
    @keyframes fadeUser {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: none; }
    }
    .user-item:hover { background: var(--surface2); }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }
    .user-name {
      font-size: 13px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-name.me { color: var(--accent); }

    /* Separateur fichiers */
    .sidebar-files {
      border-top: 1px solid var(--border);
      padding: 8px;
    }
    .sidebar-files-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 6px 8px;
    }
    #file-list {
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-item:hover { background: var(--surface2); color: var(--text); }
    .file-item svg { flex-shrink: 0; width: 13px; height: 13px; }

    /* Zone de messages */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
    }

    /* Groupe de messages du meme expediteur */
    .msg-group { display: flex; flex-direction: column; gap: 2px; }
    .msg-group + .msg-group { margin-top: 12px; }

    /* Ligne de message */
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn .35s var(--spring) both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(.95); }
      to   { opacity: 1; transform: none; }
    }
    .msg.own { flex-direction: row-reverse; }
    .msg .avatar { align-self: flex-end; flex-shrink: 0; }

    /* Bulle */
    .bubble {
      max-width: min(440px, 72%);
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg:not(.own) .bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg.own .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    /* Premier message du groupe - angle haut */
    .msg-group > .msg:first-child:not(.own) .bubble { border-top-left-radius: 18px; }
    .msg-group > .msg:first-child.own            .bubble { border-top-right-radius: 18px; }
    /* Messages intermediaires - angle plat des deux cotes */
    .msg-group > .msg:not(:first-child):not(.own) .bubble { border-top-left-radius: 4px; }
    .msg-group > .msg:not(:first-child).own            .bubble { border-top-right-radius: 4px; }

    .bubble .username {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 3px;
      opacity: .7;
    }
    .bubble .time {
      font-size: 10px;
      opacity: .5;
      float: right;
      margin-left: 8px;
      margin-top: 2px;
    }
    /* Bulle chiffree non dechiffrable */
    .bubble.encrypted-fail {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.2);
      font-style: italic;
      color: var(--danger);
    }

    /* Message systeme */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin: 8px 0;
    }

    /* Indicateur de frappe */
    #typing-bar {
      height: 20px;
      padding: 0 20px;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Zone de saisie */
    .input-area {
      height: var(--input-h);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: rgba(17,17,19,.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .upload-btn {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s;
    }
    .upload-btn:hover { background: var(--surface3); }
    .upload-btn svg { width: 16px; height: 16px; stroke: var(--muted); }
    #file-input { display: none; }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    #msg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    #msg-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform .15s var(--spring), opacity .15s;
    }
    .send-btn:hover  { opacity: .9; }
    .send-btn:active { transform: scale(.9); }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 50;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    /* Modal confirmation destruction */
    #confirm-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #confirm-modal.visible { display: flex; }
    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp .3s var(--spring) both;
    }
    .confirm-card h3 { font-size: 17px; font-weight: 700; }
    .confirm-card p  { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-actions button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .confirm-actions button:first-child {
      background: var(--surface2);
      color: var(--text);
    }
    .confirm-actions button:last-child {
      background: var(--danger);
      color: #fff;
    }
    .confirm-actions button:hover { opacity: .85; }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    @media (max-width: 600px) {
      aside { display: none; }
      .header-room-id { max-width: 80px; }
    }
  </style>
</head>
<body>

<!-- Ecran d'authentification (si session non presente) -->
<div id="auth-screen">
  <div class="auth-card">
    <div>
      <h2>Acceder a la room</h2>
      <p style="margin-top:6px">Entrez votre nom et le mot de passe pour rejoindre.</p>
    </div>
    <div class="auth-field">
      <label for="a-username">Votre nom</label>
      <input id="a-username" type="text" placeholder="Anonyme" maxlength="32" autocomplete="off">
    </div>
    <div class="auth-field">
      <label for="a-password">Mot de passe</label>
      <input id="a-password" type="password" placeholder="Mot de passe de la room" autocomplete="current-password">
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" onclick="authJoin()">Rejoindre</button>
    <div class="crypto-badge" id="crypto-badge">
      AES-256-GCM &bull; <span id="crypto-mode">...</span>
    </div>
  </div>
</div>

<!-- Application principale -->
<div id="app">
  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
    </div>
    <div class="header-title">HChat</div>
    <div class="header-room-id" id="room-id-badge" onclick="copyRoomLink()" title="Copier le lien"></div>
    <div class="btn-icon" onclick="copyRoomLink()" title="Partager la room">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </div>
    <div class="btn-icon danger" onclick="showConfirmDestroy()" title="Detruire la room">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </div>
  </header>

  <div class="layout">
    <aside>
      <div class="sidebar-section">Participants</div>
      <div id="user-list"></div>
      <div class="sidebar-files">
        <div class="sidebar-files-label">Fichiers</div>
        <div id="file-list"></div>
      </div>
    </aside>

    <main>
      <div id="messages"></div>
      <div id="typing-bar"></div>
      <div class="input-area">
        <label class="upload-btn" title="Joindre un fichier">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
          <input id="file-input" type="file" onchange="uploadFile(event)">
        </label>
        <textarea
          id="msg-input"
          rows="1"
          placeholder="Message chiffre..."
          onkeydown="onKey(event)"
          oninput="onInput()"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()" title="Envoyer">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z" fill-rule="evenodd"/></svg>
        </button>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal confirmation destruction -->
<div id="confirm-modal">
  <div class="confirm-card">
    <h3>Detruire la room ?</h3>
    <p>Cette action est irreversible. Tous les messages et fichiers seront supprimes immediatement et toutes les connexions fermees.</p>
    <div class="confirm-actions">
      <button onclick="hideConfirmDestroy()">Annuler</button>
      <button onclick="destroyRoom()">Detruire</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   Etat de l'application
   ============================================================ */

const ROOM_ID    = location.pathname.split("/room/")[1] || "";
const KEY_TOKEN  = "hchat_token_"    + ROOM_ID;
const KEY_SALT   = "hchat_salt_"     + ROOM_ID;
const KEY_PASS   = "hchat_password_" + ROOM_ID;
const KEY_USER   = "hchat_username_" + ROOM_ID;

let sessionToken = "";
let myUsername   = "";
let myUserId     = "";
let ws           = null;
let typingTimer  = null;
let isTyping     = false;
let lastGroupEl  = null;
let lastSenderId = null;
let atBottom     = true;

/* ============================================================
   Chiffrement - delegue entierement a HChatCrypto (crypto.js)
   Fonctionne avec Web Crypto API (HTTPS) et en pur JS (HTTP,
   anciens navigateurs, appareils verrouilles).
   ============================================================ */

async function encrypt(plaintext)   { return HChatCrypto.encrypt(plaintext); }
async function decrypt(payload)     { return HChatCrypto.decrypt(payload); }

/* ============================================================
   Authentification
   ============================================================ */

async function init() {
  if (!ROOM_ID) { location.href = "/"; return; }

  const token    = sessionStorage.getItem(KEY_TOKEN);
  const salt     = sessionStorage.getItem(KEY_SALT);
  const password = sessionStorage.getItem(KEY_PASS);
  const username = sessionStorage.getItem(KEY_USER);

  document.getElementById("room-id-badge").textContent = ROOM_ID.slice(0, 12) + "...";

  if (token && salt && password && username) {
    await startSession(token, salt, password, username);
  }
  // Sinon l'ecran d'auth reste visible
}

async function authJoin() {
  const username = document.getElementById("a-username").value.trim() || "Anonyme";
  const password = document.getElementById("a-password").value;
  const errEl    = document.getElementById("auth-error");
  const btn      = document.querySelector(".auth-btn");

  errEl.classList.remove("visible");
  if (!password) { errEl.textContent = "Le mot de passe est obligatoire."; errEl.classList.add("visible"); return; }

  btn.disabled = true; btn.textContent = "Connexion...";
  try {
    const res  = await fetch(`/api/rooms/${encodeURIComponent(ROOM_ID)}/join`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ password, username }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || "Mot de passe incorrect.";
      errEl.classList.add("visible");
      return;
    }
    sessionStorage.setItem(KEY_TOKEN, data.token);
    sessionStorage.setItem(KEY_SALT,  data.salt);
    sessionStorage.setItem(KEY_PASS,  password);
    sessionStorage.setItem(KEY_USER,  username);
    await startSession(data.token, data.salt, password, username);
  } catch {
    errEl.textContent = "Impossible de contacter le serveur.";
    errEl.classList.add("visible");
  } finally {
    btn.disabled = false; btn.textContent = "Rejoindre";
  }
}

async function startSession(token, salt, password, username) {
  sessionToken = token;
  myUsername   = username;

  // Extrait user_id depuis le payload du token (uniquement pour identifier ses propres messages)
  try {
    const parts  = token.split(".");
    const padded = parts[0] + "=".repeat((4 - parts[0].length % 4) % 4);
    myUserId = JSON.parse(atob(padded.replace(/-/g, "+").replace(/_/g, "/"))).uid || "";
  } catch { myUserId = ""; }

  // Derive la cle AES-256 - affiche un indicateur pendant le calcul PBKDF2
  const errEl = document.getElementById("auth-error");
  const btn   = document.querySelector(".auth-btn");
  errEl.classList.remove("visible");
  if (btn) { btn.disabled = true; btn.textContent = "Chiffrement en cours..."; }

  try {
    await HChatCrypto.deriveKey(password, salt);
  } catch (e) {
    errEl.textContent = "Erreur de chiffrement : " + (e && e.message ? e.message : "verifiez la compatibilite du navigateur.");
    errEl.classList.add("visible");
    if (btn) { btn.disabled = false; btn.textContent = "Rejoindre"; }
    return;
  }

  if (btn) { btn.disabled = false; btn.textContent = "Rejoindre"; }
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").classList.add("visible");
  connectWS();
}

/* ============================================================
   WebSocket
   ============================================================ */

let wsRetry = 0;

function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url   = `${proto}//${location.host}/ws/${ROOM_ID}?token=${encodeURIComponent(sessionToken)}`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    wsRetry = 0;
  };

  ws.onmessage = async e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    await handleServerMessage(msg);
  };

  ws.onclose = () => {
    if (wsRetry > 6) return;
    const delay = Math.min(1000 * 2 ** wsRetry, 30000);
    wsRetry++;
    setTimeout(connectWS, delay);
    addSys("Reconnexion en cours...");
  };

  ws.onerror = () => { /* onclose gere le retry */ };
}

async function handleServerMessage(msg) {
  switch (msg.type) {

    case "history":
      document.getElementById("messages").innerHTML = "";
      lastGroupEl  = null;
      lastSenderId = null;
      for (const m of msg.messages) await renderMessage(m, true);
      scrollBottom(true);
      break;

    case "message":
      await renderMessage(msg, false);
      if (atBottom) scrollBottom(false);
      break;

    case "users":
      renderUsers(msg.users);
      break;

    case "system":
      addSys(msg.message);
      break;

    case "typing":
      handleTyping(msg);
      break;

    case "file_added":
      appendFileItem(msg.filename);
      addSys(`Fichier ajoute : ${esc(msg.filename)}`);
      break;

    case "room_destroyed":
      clearSession();
      showToast("La room a ete detruite.");
      setTimeout(() => { location.href = "/"; }, 2000);
      break;

    case "error":
      showToast(msg.message);
      break;
  }
}

/* ============================================================
   Rendu des messages
   ============================================================ */

const COLORS = ["#6366f1","#8b5cf6","#ec4899","#f97316","#14b8a6","#06b6d4","#84cc16","#eab308"];

function colorOf(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return COLORS[h % COLORS.length];
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function renderMessage(msg, isHistory) {
  const own   = msg.userId === myUserId;
  const plain = await decrypt(msg.content);

  const container = document.getElementById("messages");

  // Cree un nouveau groupe si l'expediteur change
  if (msg.userId !== lastSenderId) {
    const group = document.createElement("div");
    group.className = "msg-group";
    container.appendChild(group);
    lastGroupEl  = group;
    lastSenderId = msg.userId;
  }

  const row = document.createElement("div");
  row.className = "msg" + (own ? " own" : "");

  // Avatar uniquement sur le premier message du groupe
  if (!own && lastGroupEl.children.length === 0) {
    const av = document.createElement("div");
    av.className = "avatar";
    av.style.background = colorOf(msg.username);
    av.textContent = initials(msg.username);
    row.appendChild(av);
  } else if (!own) {
    // Espace placeholder pour l'alignement
    const spacer = document.createElement("div");
    spacer.style.width = "28px";
    spacer.style.flexShrink = "0";
    row.appendChild(spacer);
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble" + (plain === null ? " encrypted-fail" : "");

  if (plain === null) {
    bubble.innerHTML = `<em>Message non dechiffrable.</em><span class="time">${esc(msg.time)}</span>`;
  } else {
    // Affiche le nom uniquement sur la premiere bulle du groupe pour les messages des autres
    const header = (!own && lastGroupEl.children.length === 0)
      ? `<div class="username">${esc(msg.username)}</div>`
      : "";
    // Eschappe le texte en clair avant affichage
    bubble.innerHTML = `${header}${esc(plain)}<span class="time">${esc(msg.time)}</span>`;
  }

  row.appendChild(bubble);
  lastGroupEl.appendChild(row);
}

function addSys(text) {
  const el = document.createElement("div");
  el.className = "sys-msg";
  el.textContent = text;
  document.getElementById("messages").appendChild(el);
  // Un message systeme coupe le regroupement
  lastGroupEl  = null;
  lastSenderId = null;
}

/* ============================================================
   Liste d'utilisateurs
   ============================================================ */

function renderUsers(users) {
  const list = document.getElementById("user-list");
  list.innerHTML = "";
  users.forEach(u => {
    const item = document.createElement("div");
    item.className = "user-item";

    const av = document.createElement("div");
    av.className = "avatar";
    av.style.background = colorOf(u.username);
    av.style.width  = "28px";
    av.style.height = "28px";
    av.style.fontSize = "11px";
    av.textContent = initials(u.username);

    const name = document.createElement("div");
    name.className = "user-name" + (u.userId === myUserId ? " me" : "");
    name.textContent = u.username + (u.userId === myUserId ? " (vous)" : "");

    item.appendChild(av);
    item.appendChild(name);
    list.appendChild(item);
  });
}

/* ============================================================
   Fichiers
   ============================================================ */

async function loadFiles() {
  try {
    const res   = await fetch(`/api/rooms/${ROOM_ID}/files?token=${encodeURIComponent(sessionToken)}`);
    const files = await res.json();
    files.forEach(appendFileItem);
  } catch { /* ignore */ }
}

function appendFileItem(filename) {
  // Evite les doublons
  const list = document.getElementById("file-list");
  if (list.querySelector(`[data-file="${CSS.escape(filename)}"]`)) return;

  const item = document.createElement("div");
  item.className = "file-item";
  item.dataset.file = filename;
  item.title = filename;
  item.onclick = () => downloadFile(filename);
  item.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    ${esc(filename)}
  `;
  list.appendChild(item);
}

function downloadFile(filename) {
  const url = `/api/rooms/${ROOM_ID}/uploads/${encodeURIComponent(filename)}?token=${encodeURIComponent(sessionToken)}`;
  const a   = document.createElement("a");
  a.href     = url;
  a.download = filename;
  a.click();
}

async function uploadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = "";

  const form = new FormData();
  form.append("file", file, file.name);

  try {
    const res  = await fetch(`/api/rooms/${ROOM_ID}/upload?token=${encodeURIComponent(sessionToken)}`, {
      method: "POST",
      body:   form,
    });
    const data = await res.json();
    if (!res.ok) showToast(data.error || "Erreur upload.");
  } catch {
    showToast("Erreur lors de l'envoi du fichier.");
  }
}

/* ============================================================
   Envoi de messages
   ============================================================ */

async function sendMessage() {
  const input = document.getElementById("msg-input");
  const plain = input.value.trim();
  if (!plain || !cryptoKey) return;

  input.value = "";
  input.style.height = "auto";
  stopTyping();

  let content;
  try {
    content = await encrypt(plain);
  } catch {
    showToast("Erreur de chiffrement.");
    return;
  }

  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "message", content }));
  }
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function onInput() {
  const ta = document.getElementById("msg-input");
  ta.style.height = "auto";
  ta.style.height = Math.min(ta.scrollHeight, 120) + "px";

  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  if (!isTyping) {
    isTyping = true;
    ws.send(JSON.stringify({ type: "typing", isTyping: true }));
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (!isTyping) return;
  isTyping = false;
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: "typing", isTyping: false }));
}

/* ============================================================
   Indicateur de frappe
   ============================================================ */

const typingUsers = new Map();

function handleTyping(msg) {
  if (msg.isTyping) {
    typingUsers.set(msg.userId, msg.username);
  } else {
    typingUsers.delete(msg.userId);
  }
  const bar = document.getElementById("typing-bar");
  if (typingUsers.size === 0) {
    bar.textContent = "";
  } else {
    const names = Array.from(typingUsers.values()).join(", ");
    bar.textContent = `${names} ${typingUsers.size === 1 ? "ecrit" : "ecrivent"}...`;
  }
}

/* ============================================================
   Scroll intelligent
   ============================================================ */

function scrollBottom(instant) {
  const el = document.getElementById("messages");
  el.scrollTo({ top: el.scrollHeight, behavior: instant ? "instant" : "smooth" });
}

document.addEventListener("DOMContentLoaded", () => {
  const el = document.getElementById("messages");
  el.addEventListener("scroll", () => {
    atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
  });
});

/* ============================================================
   Partage et destruction
   ============================================================ */

function copyRoomLink() {
  const url = `${location.origin}/room/${ROOM_ID}`;
  navigator.clipboard.writeText(url).then(() => {
    const badge = document.getElementById("room-id-badge");
    badge.classList.add("copied");
    badge.textContent = "Copie !";
    setTimeout(() => {
      badge.classList.remove("copied");
      badge.textContent = ROOM_ID.slice(0, 12) + "...";
    }, 2000);
  });
}

function showConfirmDestroy() { document.getElementById("confirm-modal").classList.add("visible"); }
function hideConfirmDestroy() { document.getElementById("confirm-modal").classList.remove("visible"); }

async function destroyRoom() {
  hideConfirmDestroy();
  try {
    const res = await fetch(`/api/rooms/${ROOM_ID}/destroy`, {
      method:  "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + sessionToken,
      },
    });
    if (!res.ok) {
      const data = await res.json();
      showToast(data.error || "Erreur lors de la destruction.");
    }
    // Si ok, le serveur envoie room_destroyed via WS qui gere la redirection
  } catch {
    showToast("Impossible de contacter le serveur.");
  }
}

function clearSession() {
  [KEY_TOKEN, KEY_SALT, KEY_PASSWORD, KEY_USERNAME].forEach(k => sessionStorage.removeItem(k));
}

/* ============================================================
   Toast
   ============================================================ */

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

/* ============================================================
   Demarrage
   ============================================================ */

window.addEventListener("DOMContentLoaded", async () => {
  // Affiche le mode crypto utilise (natif ou fallback JS)
  const modeEl = document.getElementById("crypto-mode");
  if (modeEl) {
    modeEl.textContent = HChatCrypto.isNative() ? "Web Crypto" : "JS fallback";
    modeEl.title = HChatCrypto.isNative()
      ? "Web Crypto API - accelere materiel"
      : "Implementation JS - contexte non-securise ou navigateur ancien";
  }

  await init();

  // Charge la liste de fichiers une fois la session etablie
  if (sessionToken) await loadFiles();

  // Soumettre l'auth avec Entree
  document.getElementById("a-password").addEventListener("keydown", e => {
    if (e.key === "Enter") authJoin();
  });
});
