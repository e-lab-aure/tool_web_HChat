<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HChat</title>
  <style>
    /* ============================================================
     * Design tokens - systeme de valeurs Apple-inspired
     * ============================================================ */
    :root {
      /* Couleurs */
      --bg:           #f5f5f7;
      --surface:      #ffffff;
      --glass:        rgba(255,255,255,0.82);
      --sidebar:      #1c1c1e;
      --sidebar-s:    rgba(255,255,255,0.055);
      --mine:         #1d1d1f;
      --mine-t:       #f5f5f7;
      --other:        #f2f2f7;
      --other-t:      #1d1d1f;
      --text-1:       #1d1d1f;
      --text-2:       #6e6e73;
      --text-3:       #aeaeb2;
      --accent:       #0071e3;
      --green:        #34c759;
      --red:          #ff3b30;
      --orange:       #ff9500;
      --border:       rgba(0,0,0,0.07);
      --border-2:     rgba(0,0,0,0.13);

      /* Ombres */
      --s-xs: 0 1px 2px rgba(0,0,0,0.06);
      --s-sm: 0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
      --s-md: 0 8px 28px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.05);
      --s-lg: 0 24px 64px rgba(0,0,0,0.14), 0 6px 20px rgba(0,0,0,0.06);

      /* Rayons */
      --r-bubble: 20px;
      --r-card:   16px;
      --r-ui:     12px;
      --r-sm:     8px;

      /* Typographie */
      --font:   -apple-system, BlinkMacSystemFont, "SF Pro Text",   "Segoe UI", system-ui, sans-serif;
      --font-d: -apple-system, BlinkMacSystemFont, "SF Pro Display","Segoe UI", system-ui, sans-serif;
      --font-m: "SFMono-Regular","SF Mono","Fira Mono",Consolas,monospace;

      /* Transitions */
      --ease:   cubic-bezier(0.4, 0, 0.2, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ============================================================
     * Reset et base
     * ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    button, input { font-family: inherit; }

    /* ============================================================
     * MODAL d'identification
     * ============================================================ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 900;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border-radius: 24px;
      padding: 52px 44px 44px;
      width: 390px;
      box-shadow: var(--s-lg);
      text-align: center;
      animation: modalIn 0.38s var(--spring);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.90) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .modal-icon {
      width: 60px; height: 60px; border-radius: 18px;
      background: var(--mine); color: var(--mine-t);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 28px;
    }

    .modal h2 {
      font-family: var(--font-d);
      font-size: 23px; font-weight: 700;
      letter-spacing: -0.6px; color: var(--text-1);
      margin-bottom: 8px;
    }
    .modal p {
      font-size: 14px; color: var(--text-2);
      line-height: 1.55; margin-bottom: 32px;
    }

    .modal-field {
      position: relative; margin-bottom: 14px;
    }
    .modal-input {
      width: 100%; padding: 14px 16px;
      background: var(--bg);
      border: 1.5px solid transparent;
      border-radius: var(--r-sm);
      font-size: 15px; color: var(--text-1);
      outline: none;
      transition: background 0.2s var(--ease), border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .modal-input::placeholder { color: var(--text-3); }
    .modal-input:focus {
      background: var(--surface);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0,113,227,0.14);
    }

    .modal-btn {
      width: 100%; padding: 14px;
      background: var(--mine); color: var(--mine-t);
      border: none; border-radius: var(--r-sm);
      font-size: 15px; font-weight: 600; letter-spacing: -0.1px;
      cursor: pointer;
      transition: background 0.18s var(--ease), transform 0.14s var(--spring), box-shadow 0.18s var(--ease);
      box-shadow: var(--s-sm);
    }
    .modal-btn:hover {
      background: #2c2c2e;
      transform: translateY(-1px);
      box-shadow: var(--s-md);
    }
    .modal-btn:active { transform: translateY(0); box-shadow: var(--s-xs); }

    /* ============================================================
     * Structure principale
     * ============================================================ */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .app.hidden { display: none; }

    /* ============================================================
     * HEADER - barre de verre translucide
     * ============================================================ */
    .header {
      height: 54px; flex-shrink: 0;
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100; position: relative;
    }

    .h-brand { display: flex; align-items: center; gap: 9px; }
    .h-logo {
      width: 30px; height: 30px; border-radius: 9px;
      background: var(--mine);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      box-shadow: var(--s-xs);
    }
    .h-title {
      font-family: var(--font-d);
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.4px; color: var(--text-1);
    }

    /* Indicateur de connexion - centre */
    .h-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
    }
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .conn-dot.connected {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(52,199,89,0.22);
    }
    .conn-dot.disconnected { background: var(--red); }
    .conn-dot.connecting   { background: var(--orange); animation: blink 1.1s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .conn-label { font-size: 11px; color: var(--text-3); font-weight: 500; }

    /* Actions droite */
    .h-actions { display: flex; align-items: center; gap: 6px; }

    .h-pill {
      height: 28px; padding: 0 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px; font-weight: 500; color: var(--text-2);
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background 0.16s, color 0.16s, border-color 0.16s, box-shadow 0.16s;
    }
    .h-pill:hover {
      background: rgba(0,0,0,0.045);
      color: var(--text-1);
      border-color: var(--border-2);
    }
    .h-pill.active {
      background: var(--mine); color: var(--mine-t);
      border-color: var(--mine);
      box-shadow: var(--s-xs);
    }
    .h-pill svg { display: block; }

    .h-name {
      font-size: 12px; font-weight: 500; color: var(--text-2);
      padding: 4px 10px;
      background: var(--bg);
      border-radius: 20px;
    }

    /* ============================================================
     * BODY - layout 2 colonnes
     * ============================================================ */
    .main { display: flex; flex: 1; min-height: 0; }

    /* ============================================================
     * SIDEBAR - participants
     * ============================================================ */
    .sidebar {
      width: 192px; flex-shrink: 0;
      background: var(--sidebar);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .sidebar-section {
      padding: 18px 14px 10px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.3px; color: rgba(255,255,255,0.25);
    }

    .user-list { list-style: none; padding: 0 8px 12px; }

    .user-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 8px;
      border-radius: var(--r-sm);
      cursor: default;
      transition: background 0.14s;
    }
    .user-item:hover { background: var(--sidebar-s); }

    .u-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      letter-spacing: 0;
    }

    .u-name {
      font-size: 12.5px; color: rgba(255,255,255,0.65);
      font-weight: 450; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-item.me .u-name { color: rgba(255,255,255,0.9); font-weight: 600; }

    .u-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }

    /* ============================================================
     * CHAT AREA
     * ============================================================ */
    .chat-area {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      background: var(--surface);
    }

    /* Zone de messages - scrollable */
    .chat {
      flex: 1; overflow-y: auto;
      padding: 28px 32px 12px;
      display: flex; flex-direction: column;
    }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 2px; }
    .chat::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.20); }

    /* --- Groupes de messages --- */
    .msg-group {
      display: flex; flex-direction: column;
      margin-bottom: 20px;
    }
    .msg-group.mine  { align-items: flex-end; }
    .msg-group.other { align-items: flex-start; }

    /* En-tete du groupe (avatar + nom) - seulement pour les autres */
    .group-head {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 7px;
    }
    .group-head-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .group-head-name {
      font-size: 11.5px; font-weight: 600;
      color: var(--text-2); letter-spacing: 0.1px;
    }

    /* Ligne bulle - [spacer 36px] + bulle (ou juste bulle pour mine) */
    .msg-row { display: flex; align-items: flex-end; margin-bottom: 3px; }
    .msg-group.mine .msg-row { flex-direction: row-reverse; }
    .msg-spacer { width: 36px; flex-shrink: 0; } /* aligne avec avatar du group-head */

    /* Bulle */
    .bubble {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: var(--r-bubble);
      animation: bubbleIn 0.26s var(--spring);
      position: relative;
    }
    .bubble.no-anim { animation: none; }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(7px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .msg-group.mine  .bubble {
      background: var(--mine); color: var(--mine-t);
      border-bottom-right-radius: 5px;
    }
    .msg-group.other .bubble {
      background: var(--other); color: var(--other-t);
      border-bottom-left-radius: 5px;
    }

    .bubble-text {
      font-size: 14px; line-height: 1.5;
      word-break: break-word; white-space: pre-wrap;
    }
    .bubble-text * { max-width: 100%; }
    .mine .bubble-text a  { color: rgba(255,255,255,0.72); text-decoration: underline; }
    .other .bubble-text a { color: var(--accent); }
    .bubble-text code {
      font-family: var(--font-m); font-size: 12.5px;
      padding: 1px 5px; border-radius: 4px;
      background: rgba(0,0,0,0.09);
    }
    .mine .bubble-text code { background: rgba(255,255,255,0.18); }
    .bubble-text pre {
      font-family: var(--font-m); font-size: 12.5px;
      padding: 10px 12px; border-radius: 8px;
      overflow-x: auto; margin: 6px 0;
      background: rgba(0,0,0,0.06); white-space: pre;
    }
    .mine .bubble-text pre { background: rgba(255,255,255,0.13); }

    /* Heure + copie - visibles au survol */
    .bubble-foot {
      display: flex; align-items: center; gap: 4px;
      margin-top: 4px; height: 14px;
      opacity: 0; transition: opacity 0.18s var(--ease);
    }
    .msg-row:hover .bubble-foot { opacity: 1; }
    .msg-group.mine  .bubble-foot { justify-content: flex-end; }
    .msg-group.other .bubble-foot { justify-content: flex-start; padding-left: 36px; }
    .bubble-time { font-size: 10px; color: var(--text-3); }
    .bubble-copy {
      background: none; border: none; cursor: pointer;
      font-size: 10.5px; color: var(--text-3); padding: 0 3px;
      border-radius: 3px;
      transition: color 0.14s, background 0.14s;
    }
    .bubble-copy:hover { color: var(--text-2); background: rgba(0,0,0,0.05); }

    /* Message systeme (rejoindre / quitter) */
    .sys {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0;
    }
    .sys::before, .sys::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .sys-text {
      font-size: 11px; color: var(--text-3);
      white-space: nowrap; font-weight: 500;
      letter-spacing: 0.1px;
    }

    /* ============================================================
     * INDICATEUR DE FRAPPE
     * ============================================================ */
    .typing-row {
      min-height: 28px;
      padding: 0 32px 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .typing-bubble {
      display: none;
      background: var(--other);
      padding: 9px 14px;
      border-radius: var(--r-bubble);
      border-bottom-left-radius: 5px;
      align-items: center; gap: 3px;
    }
    .typing-bubble.show { display: flex; animation: bubbleIn 0.24s var(--spring); }
    .typing-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-3);
      animation: dotUp 1.4s var(--ease) infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotUp {
      0%,55%,100% { transform: translateY(0);   opacity: 0.4; }
      28%          { transform: translateY(-5px); opacity: 1; }
    }
    .typing-label { font-size: 11px; color: var(--text-3); margin-left: 4px; }

    /* ============================================================
     * ZONE DE SAISIE
     * ============================================================ */
    .input-zone {
      padding: 10px 20px 20px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-top: 1px solid var(--border);
    }

    .input-opts {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 9px; padding: 0 2px;
    }
    .opt {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-3); cursor: pointer;
      user-select: none; transition: color 0.15s;
    }
    .opt:hover { color: var(--text-2); }
    .opt input { margin: 0; cursor: pointer; accent-color: var(--accent); }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      font-size: 16px; padding: 2px; line-height: 1;
      opacity: 0.35;
      transition: opacity 0.16s, transform 0.16s var(--spring);
    }
    .icon-btn:hover  { opacity: 0.72; transform: scale(1.12); }
    .icon-btn.active { opacity: 1; }

    /* La barre de saisie elle-meme */
    .input-bar {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--bg);
      border: 1.5px solid transparent;
      border-radius: 18px;
      padding: 5px 5px 5px 16px;
      transition: border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .input-bar:focus-within {
      border-color: rgba(0,0,0,0.11);
      background: var(--surface);
      box-shadow: var(--s-sm);
    }

    .editable {
      flex: 1;
      padding: 7px 0;
      min-height: 34px; max-height: 180px; overflow-y: auto;
      font-size: 14px; color: var(--text-1); line-height: 1.5;
      outline: none; white-space: pre-wrap; word-break: break-word;
    }
    .editable:empty::before {
      content: attr(data-ph);
      color: var(--text-3); pointer-events: none;
    }
    .editable::-webkit-scrollbar { width: 3px; }
    .editable::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.10); border-radius: 2px; }
    .editable code {
      font-family: var(--font-m); font-size: 12.5px;
      background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 4px;
    }
    .editable pre {
      background: rgba(0,0,0,0.05); padding: 8px 10px;
      border-radius: 6px; font-family: var(--font-m); font-size: 12.5px;
      overflow-x: auto; margin: 4px 0; white-space: pre;
    }

    /* Bouton fichier dans la barre (trombone) */
    .attach-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
      opacity: 0.38; transition: opacity 0.16s, background 0.16s;
    }
    .attach-btn:hover { opacity: 0.72; background: rgba(0,0,0,0.06); }

    /* Bouton envoyer - cercle noir */
    .send-btn {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: var(--mine); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--s-xs);
      transition: background 0.16s var(--ease), transform 0.16s var(--spring), box-shadow 0.16s;
    }
    .send-btn:hover:not(:disabled) {
      background: #2c2c2e; transform: scale(1.06); box-shadow: var(--s-sm);
    }
    .send-btn:active:not(:disabled) { transform: scale(0.93); }
    .send-btn:disabled { background: #d1d1d6; cursor: not-allowed; box-shadow: none; }
    .send-btn svg { display: block; }

    /* ============================================================
     * TIROIR FICHIERS (drawer)
     * ============================================================ */
    .drawer-bg {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.24);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.26s var(--ease);
    }
    .drawer-bg.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 330px; z-index: 210;
      background: var(--surface);
      display: flex; flex-direction: column;
      box-shadow: var(--s-lg);
      transform: translateX(100%);
      transition: transform 0.3s var(--ease);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-top {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: var(--font-d);
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.5px; color: var(--text-1);
    }
    .drawer-x {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--text-2);
      transition: background 0.14s;
    }
    .drawer-x:hover { background: var(--other); }

    /* Zone de depot / upload */
    .drop-area {
      margin: 16px 16px 8px;
      border: 1.5px dashed rgba(0,0,0,0.13);
      border-radius: var(--r-card);
      padding: 28px 16px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-area:hover,
    .drop-area.over {
      border-color: var(--accent);
      background: rgba(0,113,227,0.03);
    }
    .drop-icon  { font-size: 30px; opacity: 0.45; margin-bottom: 9px; }
    .drop-label { font-size: 13px; color: var(--text-2); font-weight: 500; }
    .drop-sub   { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .file-input-h { display: none; }

    .upload-msg {
      margin: 0 16px 10px;
      font-size: 12px; min-height: 16px;
    }
    .upload-msg.ok    { color: #34c759; }
    .upload-msg.error { color: #ff3b30; }

    /* Liste des fichiers */
    .file-scroll { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
    .file-scroll::-webkit-scrollbar { width: 3px; }
    .file-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.09); border-radius: 2px; }

    .files-subtitle {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text-3);
      margin-bottom: 10px; padding-top: 2px;
    }
    .file-items { list-style: none; display: flex; flex-direction: column; gap: 5px; }

    .file-link {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 12px;
      background: var(--bg); border-radius: var(--r-ui);
      text-decoration: none;
      transition: background 0.15s, transform 0.18s var(--spring);
    }
    .file-link:hover { background: var(--other); transform: translateX(3px); }
    .file-link-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .file-link-name {
      flex: 1; font-size: 12.5px; color: var(--text-1);
      font-weight: 500; word-break: break-all; line-height: 1.35;
    }
    .file-link-arr { font-size: 11px; color: var(--text-3); flex-shrink: 0; }

    /* ============================================================
     * Responsive
     * ============================================================ */
    @media (max-width: 720px) {
      .sidebar { display: none; }
      .chat    { padding: 20px 18px 10px; }
      .drawer  { width: 100%; }
      .typing-row, .bubble-foot { padding-left: 18px; }
    }
  </style>
</head>
<body>

<!-- ================================================================
     MODAL : identification
     ================================================================ -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-icon">💬</div>
    <h2>Bienvenue sur HChat</h2>
    <p>Choisissez un nom pour rejoindre<br>la conversation.</p>
    <div class="modal-field">
      <input type="text" id="username-input" class="modal-input"
             placeholder="Votre nom..." maxlength="32" autocomplete="off">
    </div>
    <button class="modal-btn" id="join-btn">Rejoindre</button>
  </div>
</div>

<!-- ================================================================
     APPLICATION
     ================================================================ -->
<div id="app" class="app hidden">

  <!-- HEADER -->
  <header class="header">
    <div class="h-brand">
      <div class="h-logo">💬</div>
      <span class="h-title">HChat</span>
    </div>

    <div class="h-center">
      <span class="conn-dot connecting" id="conn-dot"></span>

    <div class="h-actions">
      <button class="h-pill" id="users-btn">

      <button class="h-pill" id="files-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
        Fichiers
      </button>
      <span class="h-name" id="my-name"></span>
    </div>
  </header>

  <!-- BODY -->
  <div class="main">

    <!-- Sidebar : participants -->
    <aside class="sidebar">
      <div class="sidebar-section">Participants</div>

    <!-- Zone principale de chat -->
    <section class="chat-area">

      <!-- Indicateur de frappe -->
      <div class="typing-row" id="typing-row">
        <div class="typing-bubble" id="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
        <span class="typing-label" id="typing-label"></span>
      </div>

      <!-- Saisie -->
      <div class="input-zone">
        <div class="input-opts">
          <label class="opt">
            <input type="checkbox" id="richToggle" checked>
            Formatage riche

        <div class="input-bar">
          <div id="msg" class="editable" contenteditable="true"
               data-ph="Message... (Entree pour envoyer, Maj+Entree pour saut de ligne)"></div>
          <button class="attach-btn" id="attach-btn" title="Joindre un fichier">📎</button>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>

  </div>
</div>

<!-- ================================================================
     TIROIR FICHIERS
     ================================================================ -->
<div class="drawer-bg" id="drawer-bg"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-top">
    <span class="drawer-title">Fichiers partagés</span>
    <button class="drawer-x" id="drawer-x">✕</button>
  </div>

  <label class="drop-area" id="drop-area" for="file-input-h">
    <div class="drop-icon">📂</div>
    <div class="drop-label">Cliquer ou deposer un fichier</div>
    <div class="drop-sub">PDF, images, documents — max 10 Mo</div>
  </label>
  <input type="file" id="file-input-h" class="file-input-h">

  <div id="upload-msg" class="upload-msg"></div>

  <div class="file-scroll">
    <div class="files-subtitle">Disponibles</div>
    <ul id="file-items" class="file-items"></ul>
  </div>
</aside>

<script>
(function () {
  "use strict";

  /* ============================================================
   * Utilitaires
   * ============================================================ */

  /** Genere un UUID v4. */
  function uuid() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      var r = Math.random() * 16 | 0;
      return (c === "x" ? r : r & 0x3 | 0x8).toString(16);
    });
  }

  /** Echappe les caracteres HTML sensibles. */
  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  /**
   * Retourne une couleur deterministe pour un nom d'utilisateur.
   * La palette respecte les couleurs systeme Apple (vibrant, accessibles).
   */
  function colorOf(name) {
    var p = ["#5856d6","#af52de","#ff3b30","#ff9500","#34c759","#007aff","#ff2d55","#30b0c7","#a2845e"];
    var h = 0;
    for (var i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return p[Math.abs(h) % p.length];
  }

  /** Cree un element avatar (cercle colore avec initiales). */
  function avatar(name, size) {
    var el = document.createElement("div");
    el.style.cssText = [
      "width:" + size + "px",
      "height:" + size + "px",
      "border-radius:50%",
      "background:" + colorOf(name),
      "display:flex",
      "align-items:center",
      "justify-content:center",
      "font-size:" + Math.floor(size * 0.37) + "px",
      "font-weight:700",
      "color:#fff",
      "flex-shrink:0",
      "letter-spacing:0",
    ].join(";");
    el.textContent = name.slice(0, 2).toUpperCase();
    return el;
  }

  /** Icone emoji selon l'extension du fichier. */
  function fileEmoji(name) {
    var ext = (name.split(".").pop() || "").toLowerCase();
    return { pdf:"📄",xlsx:"📊",xls:"📊",docx:"📝",doc:"📝",
             png:"🖼",jpg:"🖼",jpeg:"🖼",gif:"🖼",webp:"🖼",
             zip:"📦",csv:"📊",md:"📋",py:"💻",js:"💻",ts:"💻",
             json:"💻",txt:"📄" }[ext] || "📎";
  }

  /**
   * Sanitize le HTML colle avant insertion dans le contenteditable.
   * Supprime les elements dangereux, convertit les blocs en inline,
   * filtre les attributs.
   */
  function sanitizePaste(html) {
    var d = document.createElement("div");
    d.innerHTML = html;
    d.querySelectorAll("script,style,meta,link,head,iframe,object,embed,form,input").forEach(function(e){ e.remove(); });
    ["div","p","h1","h2","h3","h4","h5","h6","blockquote","section","article","header","footer","nav","aside","main"]
      .forEach(function(tag){
        d.querySelectorAll(tag).forEach(function(e){
          if (e.nextSibling || e.parentNode !== d) e.insertAdjacentHTML("afterend","<br>");
          while (e.firstChild) e.parentNode.insertBefore(e.firstChild, e);
          e.remove();
        });
      });
    var safe = new Set(["b","strong","i","em","u","s","del","code","pre","br","ul","ol","li","a","span","table","tr","td","th"]);
    var ok   = { a:["href"], td:["colspan","rowspan"], th:["colspan","rowspan"] };
    d.querySelectorAll("*").forEach(function(e){
      var t = e.tagName.toLowerCase();
      if (!safe.has(t)) { e.replaceWith(document.createTextNode(e.textContent)); return; }
      var a = ok[t] || [];
      Array.from(e.attributes).forEach(function(x){ if (a.indexOf(x.name) < 0) e.removeAttribute(x.name); });
      if (t === "a" && /^javascript:/i.test((e.getAttribute("href")||"").trim())) e.removeAttribute("href");
    });
    return d.innerHTML.replace(/<br\s*\/?>/gi,"<br>").replace(/(<br>){3,}/g,"<br><br>").replace(/^(<br>)+/,"").replace(/(<br>)+$/,"");
  }

  /**
   * Sanitize le HTML recu du serveur avant injection dans le DOM.
   * Deuxieme couche de defense contre un client malveillant.
   */
  function sanitizeIn(html) {
    var d = document.createElement("div");
    d.innerHTML = html;
    d.querySelectorAll("script,style,meta,link,head,iframe,object,embed,form,input").forEach(function(e){ e.remove(); });
    var safe = new Set(["b","strong","i","em","u","s","del","code","pre","br","ul","ol","li","a","span","table","tr","td","th"]);
    var ok   = { a:["href"], td:["colspan","rowspan"], th:["colspan","rowspan"] };
    d.querySelectorAll("*").forEach(function(e){
      var t = e.tagName.toLowerCase();
      if (!safe.has(t)) { e.replaceWith(document.createTextNode(e.textContent)); return; }
      var a = ok[t] || [];
      Array.from(e.attributes).forEach(function(x){ if (a.indexOf(x.name) < 0) e.removeAttribute(x.name); });
      if (t === "a") {
        var h = (e.getAttribute("href")||"").trim();
        if (/^javascript:/i.test(h)) e.removeAttribute("href");
        else { e.setAttribute("target","_blank"); e.setAttribute("rel","noopener noreferrer"); }
      }
    });
    return d.innerHTML;
  }

  /* ============================================================
   * Etat global
   * ============================================================ */

  var userId   = localStorage.getItem("uid") || (function(){ var id=uuid(); localStorage.setItem("uid",id); return id; })();
  var username = localStorage.getItem("uname") || "";

  var ws           = null;
  var wsDelay      = 1000;
  var typTimer     = null;
  var typSent      = false;
  var typingUsers  = {};       // userId -> nom
  var notifOn      = false;
  var atBottom     = true;

  // Groupement de bulles consecutives du meme emetteur
  var lastUid  = null;
  var lastGrp  = null;

  /* ============================================================
   * Refs DOM
   * ============================================================ */

  var $modal    = document.getElementById("modal-overlay");
  var $uInput   = document.getElementById("username-input");
  var $joinBtn  = document.getElementById("join-btn");
  var $app      = document.getElementById("app");
  var $dot      = document.getElementById("conn-dot");
  var $connLbl  = document.getElementById("conn-label");
  var $myName   = document.getElementById("my-name");
  var $ucnt     = document.getElementById("user-count");
  var $ulist    = document.getElementById("user-list");
  var $chat     = document.getElementById("chat");
  var $typBbl   = document.getElementById("typing-bubble");
  var $typLbl   = document.getElementById("typing-label");
  var $msg      = document.getElementById("msg");
  var $send     = document.getElementById("sendBtn");
  var $rich     = document.getElementById("richToggle");
  var $notif    = document.getElementById("notifBtn");
  var $fBtn     = document.getElementById("files-btn");
  var $attBtn   = document.getElementById("attach-btn");
  var $drawer   = document.getElementById("drawer");
  var $dBg      = document.getElementById("drawer-bg");
  var $dX       = document.getElementById("drawer-x");
  var $drop     = document.getElementById("drop-area");
  var $fInput   = document.getElementById("file-input-h");
  var $upMsg    = document.getElementById("upload-msg");
  var $fItems   = document.getElementById("file-items");

  /* ============================================================
   * Scroll intelligent
   * ============================================================ */

  $chat.addEventListener("scroll", function () {
    atBottom = $chat.scrollHeight - $chat.scrollTop - $chat.clientHeight < 90;
  });

  function scrollDown(force) {
    if (force || atBottom) $chat.scrollTop = $chat.scrollHeight;
  }

  /* ============================================================
   * Modal - identification
   * ============================================================ */

  if (username) {
    boot();
  } else {
    $uInput.focus();
  }

  $joinBtn.addEventListener("click", submitName);
  $uInput.addEventListener("keydown", function (e) { if (e.key === "Enter") submitName(); });

  function submitName() {
    var n = $uInput.value.trim().slice(0, 32);
    if (!n) return;
    username = n;
    localStorage.setItem("uname", username);
    boot();
  }

  function boot() {
    $modal.classList.add("hidden");
    $app.classList.remove("hidden");
    $myName.textContent = username;
    fetchFiles();
    connect();
  }

  /* ============================================================
   * WebSocket
   * ============================================================ */

  function connect() {
    setStatus("connecting");
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(proto + "//" + location.host + "/ws");

    ws.onopen = function () {
      wsDelay = 1000;
      setStatus("connected");
      ws.send(JSON.stringify({ type: "join", userId: userId, username: username }));
    };
    ws.onmessage = function (e) {
      var d; try { d = JSON.parse(e.data); } catch(x){ return; }
      route(d);
    };
    ws.onclose = function () {
      setStatus("disconnected");
      var delay = wsDelay;
      wsDelay = Math.min(wsDelay * 2, 30000);
      setTimeout(function () { if (!ws || ws.readyState === WebSocket.CLOSED) connect(); }, delay);
    };
    ws.onerror = function () { setStatus("disconnected"); };
  }

  function setStatus(s) {
    $dot.className = "conn-dot " + s;
    $connLbl.textContent = { connected: "Connecté", disconnected: "Déconnecté", connecting: "Connexion..." }[s];
    $send.disabled = s !== "connected";
  }

  /* ============================================================
   * Routeur de messages
   * ============================================================ */

  function route(d) {
    if (d.type === "history")    { d.messages.forEach(function(m){ addMsg(m, true); }); scrollDown(true); }
    else if (d.type === "message") { addMsg(d, false); notify(d); scrollDown(false); }
    else if (d.type === "system")  { addSys(d.message); scrollDown(false); }
    else if (d.type === "users")   { renderUsers(d.users); }
    else if (d.type === "typing")  { onTyping(d); }
    else if (d.type === "file_added") { appendFile(d.filename); }
    else if (d.type === "error")   { setUpMsg(d.message, "error"); }
  }

  /* ============================================================
   * Rendu des messages
   * ============================================================ */

  function addMsg(data, hist) {
    var mine      = data.userId === userId;
    var sameGroup = data.userId === lastUid && lastGrp;

    var grp;
    if (!sameGroup) {
      grp = document.createElement("div");
      grp.className = "msg-group " + (mine ? "mine" : "other");

      // En-tete uniquement pour les autres : avatar + nom
      if (!mine) {
        var head = document.createElement("div");
        head.className = "group-head";

        var av = avatar(data.username || "?", 28);
        av.className = "group-head-avatar";
        av.style.background = colorOf(data.username || "?");

        var nm = document.createElement("span");
        nm.className = "group-head-name";
        nm.textContent = data.username || "Inconnu";

        head.appendChild(av);
        head.appendChild(nm);
        grp.appendChild(head);
      }

      $chat.appendChild(grp);
      lastGrp = grp;
      lastUid = data.userId;
    } else {
      grp = lastGrp;
    }

    /* Ligne : [spacer 36px pour les autres] + bulle */
    var row = document.createElement("div");
    row.className = "msg-row";

    if (!mine) {
      var sp = document.createElement("div");
      sp.className = "msg-spacer";
      row.appendChild(sp);
    }

    /* Bulle */
    var bbl = document.createElement("div");
    bbl.className = "bubble" + (hist ? " no-anim" : "");

    var txt = document.createElement("div");
    txt.className = "bubble-text";
    txt.innerHTML = sanitizeIn(data.content || "") || esc(data.plain || "");

    /* Pied de bulle : copier + heure (visible au survol) */
    var foot = document.createElement("div");
    foot.className = "bubble-foot";

    var cpBtn = document.createElement("button");
    cpBtn.className = "bubble-copy";
    cpBtn.textContent = "Copier";
    cpBtn.addEventListener("click", function () { copy(data.content || "", data.plain || ""); });

    var tm = document.createElement("span");
    tm.className = "bubble-time";
    tm.textContent = data.time || "";

    foot.appendChild(cpBtn);
    foot.appendChild(tm);
    bbl.appendChild(txt);
    bbl.appendChild(foot);
    row.appendChild(bbl);
    grp.appendChild(row);
  }

  function addSys(text) {
    // Brise le groupement visuel
    lastUid = null; lastGrp = null;

    var el = document.createElement("div");
    el.className = "sys";
    var sp = document.createElement("span");
    sp.className = "sys-text";
    sp.textContent = text;
    el.appendChild(sp);
    $chat.appendChild(el);
  }

  /* ============================================================
   * Utilisateurs en ligne
   * ============================================================ */

  function renderUsers(users) {
    $ucnt.textContent = users.length;
    $ulist.innerHTML = "";
    users.forEach(function (u) {
      var li = document.createElement("li");
      li.className = "user-item" + (u.userId === userId ? " me" : "");

      var av = document.createElement("div");
      av.className = "u-avatar";
      av.style.background = colorOf(u.username);
      av.textContent = u.username.slice(0, 2).toUpperCase();

      var nm = document.createElement("span");
      nm.className = "u-name";
      nm.textContent = u.username + (u.userId === userId ? " (moi)" : "");

      var dt = document.createElement("span");
      dt.className = "u-dot";

      li.appendChild(av); li.appendChild(nm); li.appendChild(dt);
      $ulist.appendChild(li);
    });
  }

  /* ============================================================
   * Indicateur de frappe
   * ============================================================ */

  function onTyping(d) {
    if (d.userId === userId) return;
    if (d.isTyping) typingUsers[d.userId] = d.username;
    else delete typingUsers[d.userId];
    updateTyping();
  }

  function updateTyping() {
    var names = Object.values(typingUsers);
    if (!names.length) {
      $typBbl.classList.remove("show");
      $typLbl.textContent = "";
      return;
    }
    $typBbl.classList.add("show");
    $typLbl.textContent = names.length === 1
      ? names[0] + " écrit..."
      : names.length + " personnes écrivent...";
  }

  function sendTyping(v) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (v === typSent) return;
    typSent = v;
    ws.send(JSON.stringify({ type: "typing", userId: userId, username: username, isTyping: v }));
  }

  $msg.addEventListener("input", function () {
    sendTyping(true);
    clearTimeout(typTimer);
    typTimer = setTimeout(function () { sendTyping(false); }, 2000);
  });

  /* ============================================================
   * Envoi de messages
   * ============================================================ */

  $msg.addEventListener("paste", function (e) {
    e.preventDefault();
    var cd = e.clipboardData || window.clipboardData;
    var hasHtml = cd.types && Array.prototype.indexOf.call(cd.types, "text/html") >= 0;
    if ($rich.checked && hasHtml) document.execCommand("insertHTML", false, sanitizePaste(cd.getData("text/html")));
    else document.execCommand("insertText", false, cd.getData("text/plain"));
  });

  $msg.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
  $send.addEventListener("click", sendMsg);

  function sendMsg() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    var html = $msg.innerHTML.trim();
    var text = $msg.innerText.trim();
    if (!text) return;
    clearTimeout(typTimer); sendTyping(false);
    ws.send(JSON.stringify({ type: "message", content: html, plain: text, userId: userId, username: username }));
    $msg.innerHTML = "";
    atBottom = true;
  }

  /* ============================================================
   * Copie de messages
   * ============================================================ */

  function copy(richHtml, plain) {
    if ($rich.checked && navigator.clipboard && window.ClipboardItem) {
      try {
        navigator.clipboard.write([new ClipboardItem({
          "text/html":  new Blob([richHtml], { type: "text/html" }),
          "text/plain": new Blob([plain],    { type: "text/plain" }),
        })]).catch(function(){ richFallback(richHtml); });
        return;
      } catch(e){}
    }
    if ($rich.checked) richFallback(richHtml);
    else if (navigator.clipboard) navigator.clipboard.writeText(plain);
    else plainFallback(plain);
  }
  function richFallback(h) {
    var el = document.createElement("div");
    el.contentEditable="true"; el.innerHTML=h;
    el.style.cssText="position:fixed;left:-9999px;top:0;opacity:0;";
    document.body.appendChild(el);
    var s=window.getSelection(), r=document.createRange();
    r.selectNodeContents(el); s.removeAllRanges(); s.addRange(r);
    try{ document.execCommand("copy"); }catch(e){}
    s.removeAllRanges(); document.body.removeChild(el);
  }
  function plainFallback(t) {
    var ta=document.createElement("textarea");
    ta.value=t; ta.style.cssText="position:fixed;left:-9999px;top:0;opacity:0;";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  }

  /* ============================================================
   * Fichiers - drawer
   * ============================================================ */

  $fBtn.addEventListener("click",  openDrawer);
  $attBtn.addEventListener("click", openDrawer);
  $dBg.addEventListener("click",   closeDrawer);
  $dX.addEventListener("click",    closeDrawer);

  function openDrawer()  { $drawer.classList.add("open"); $dBg.classList.add("open"); $fBtn.classList.add("active"); }
  function closeDrawer() { $drawer.classList.remove("open"); $dBg.classList.remove("open"); $fBtn.classList.remove("active"); }

  // Drag & drop
  $drop.addEventListener("dragover",  function(e){ e.preventDefault(); $drop.classList.add("over"); });
  $drop.addEventListener("dragleave", function()  { $drop.classList.remove("over"); });
  $drop.addEventListener("drop", function(e){
    e.preventDefault(); $drop.classList.remove("over");
    var f = e.dataTransfer.files[0];
    if (f) upload(f);
  });
  $fInput.addEventListener("change", function(){
    var f = $fInput.files[0]; if (!f) return;
    $fInput.value = ""; upload(f);
  });

  function upload(file) {
    setUpMsg("Envoi en cours...", "");
    var fd = new FormData(); fd.append("file", file);
    fetch("/upload", { method: "POST", body: fd })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok) { setUpMsg("Fichier envoyé.", "ok"); setTimeout(function(){ setUpMsg("",""); }, 3000); }
        else setUpMsg(d.error || "Erreur.", "error");
      })
      .catch(function(){ setUpMsg("Erreur réseau.", "error"); });
  }

  function fetchFiles() {
    fetch("/files").then(function(r){ return r.json(); }).then(function(fs){ fs.forEach(appendFile); }).catch(function(){});
  }

  function appendFile(name) {
    if ($fItems.querySelector("[data-n='" + CSS.escape(name) + "']")) return;

    var li = document.createElement("li");
    li.setAttribute("data-n", name);

    var a = document.createElement("a");
    a.className = "file-link";
    a.href = "/uploads/" + encodeURIComponent(name);
    a.target = "_blank"; a.rel = "noopener noreferrer";

    var ico = document.createElement("span");
    ico.className = "file-link-icon"; ico.textContent = fileEmoji(name);

    var nm = document.createElement("span");
    nm.className = "file-link-name"; nm.textContent = name;

    var arr = document.createElement("span");
    arr.className = "file-link-arr"; arr.textContent = "↗";

    a.appendChild(ico); a.appendChild(nm); a.appendChild(arr);
    li.appendChild(a);
    $fItems.appendChild(li);
  }

  function setUpMsg(msg, type) {
    $upMsg.textContent = msg;
    $upMsg.className   = "upload-msg " + type;
  }

  /* ============================================================
   * Notifications navigateur
   * ============================================================ */

  $notif.addEventListener("click", function() {
    if (!("Notification" in window)) return;
    if (Notification.permission === "granted") {
      notifOn = !notifOn;
      $notif.classList.toggle("active", notifOn);
    } else if (Notification.permission !== "denied") {
      Notification.requestPermission().then(function(p){
        if (p === "granted") { notifOn = true; $notif.classList.add("active"); }
      });
    }
  });

  function notify(d) {
    if (!notifOn || document.hasFocus() || d.userId === userId) return;
    if (Notification.permission !== "granted") return;
    new Notification(d.username || "HChat", { body: (d.plain || "").slice(0, 100) });
  }

})();
</script>
</body>
</html>
