<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HChat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0b;
      --surface:     #111113;
      --surface2:    #1a1a1e;
      --border:      rgba(255,255,255,.07);
      --accent:      #6366f1;
      --accent-soft: rgba(99,102,241,.15);
      --text:        #f0f0f2;
      --muted:       #6b6b78;
      --danger:      #f87171;
      --radius:      16px;
      --spring:      cubic-bezier(.34,1.56,.64,1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 10%, rgba(99,102,241,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(139,92,246,.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .brand {
      text-align: center;
      margin-bottom: 48px;
    }
    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(99,102,241,.3);
    }
    .brand-logo svg { width: 26px; height: 26px; fill: #fff; }
    .brand h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.5px;
    }
    .brand p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: color .2s, background .2s;
      position: relative;
    }
    .tab.active {
      color: var(--text);
      background: var(--surface2);
    }
    .tab.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    .panels { padding: 28px; }
    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .field input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s var(--spring), opacity .15s, box-shadow .2s;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: .9; box-shadow: 0 4px 20px rgba(99,102,241,.4); }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-primary .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    .btn-primary.loading .label { display: none; }
    .btn-primary.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      font-size: 13px;
      color: var(--danger);
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      border-radius: 8px;
      padding: 10px 12px;
      display: none;
    }
    .error-msg.visible { display: block; }

    .security-note {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(99,102,241,.07);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .security-note svg { flex-shrink: 0; margin-top: 1px; opacity: .6; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
    </div>
    <h1>HChat</h1>
    <p>Conversations chiffrees, ephemeres, privees.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-create" onclick="switchTab('create')">Nouvelle room</button>
      <button class="tab" id="tab-join" onclick="switchTab('join')">Rejoindre</button>
    </div>

    <div class="panels">
      <div class="panel active" id="panel-create">
        <div class="field">
          <label for="create-username">Votre nom</label>
          <input id="create-username" type="text" placeholder="Anonyme" maxlength="32" autocomplete="off">
        </div>
        <div class="field">
          <label for="create-password">Mot de passe de la room</label>
          <input id="create-password" type="password" placeholder="Min. 6 caracteres" autocomplete="new-password">
        </div>
        <div class="security-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <span>Messages chiffres de bout en bout via AES-GCM 256. Le serveur ne peut pas lire vos echanges. La room s'autodetruit apres 24h.</span>
        </div>
        <div class="error-msg" id="create-error"></div>
        <button class="btn-primary" id="btn-create" onclick="createRoom()">
          <span class="label">Creer la room</span>
          <div class="spinner"></div>
        </button>
      </div>

      <div class="panel" id="panel-join">
        <div class="field">
          <label for="join-username">Votre nom</label>
          <input id="join-username" type="text" placeholder="Anonyme" maxlength="32" autocomplete="off">
        </div>
        <div class="divider">identifiant de la room</div>
        <div class="field">
          <label for="join-room-id">Room ID</label>
          <input id="join-room-id" type="text" placeholder="Collez le lien ou l'identifiant" autocomplete="off" spellcheck="false">
        </div>
        <div class="field">
          <label for="join-password">Mot de passe</label>
          <input id="join-password" type="password" placeholder="Mot de passe de la room" autocomplete="current-password">
        </div>
        <div class="error-msg" id="join-error"></div>
        <button class="btn-primary" id="btn-join" onclick="joinRoom()">
          <span class="label">Rejoindre</span>
          <div class="spinner"></div>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Pre-remplissage si on arrive depuis un lien /room/{id}
  const pathMatch = location.pathname.match(/^\/room\/([^/]+)$/);
  if (pathMatch) {
    switchTab("join");
    document.getElementById("join-room-id").value = pathMatch[1];
  }

  function switchTab(tab) {
    document.getElementById("tab-create").classList.toggle("active", tab === "create");
    document.getElementById("tab-join").classList.toggle("active",   tab === "join");
    document.getElementById("panel-create").classList.toggle("active", tab === "create");
    document.getElementById("panel-join").classList.toggle("active",   tab === "join");
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle("loading", loading);
    btn.disabled = loading;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add("visible");
  }

  function clearError(id) {
    document.getElementById(id).classList.remove("visible");
  }

  // Extrait le room_id depuis une URL complete ou un identifiant brut
  function extractRoomId(raw) {
    const m = raw.match(/\/room\/([^/?#]+)/);
    return m ? m[1] : raw.trim();
  }

  async function createRoom() {
    clearError("create-error");
    const username = document.getElementById("create-username").value.trim() || "Anonyme";
    const password = document.getElementById("create-password").value;

    if (!password)          { showError("create-error", "Le mot de passe est obligatoire."); return; }
    if (password.length < 6){ showError("create-error", "Le mot de passe doit faire au moins 6 caracteres."); return; }

    setLoading("btn-create", true);
    try {
      const res  = await fetch("/api/rooms", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ password, username }),
      });
      const data = await res.json();
      if (!res.ok) { showError("create-error", data.error || "Erreur inconnue."); return; }

      storeSession(data.room_id, data.token, data.salt, password, username);
      location.href = "/room/" + data.room_id;
    } catch {
      showError("create-error", "Impossible de contacter le serveur.");
    } finally {
      setLoading("btn-create", false);
    }
  }

  async function joinRoom() {
    clearError("join-error");
    const username = document.getElementById("join-username").value.trim() || "Anonyme";
    const roomId   = extractRoomId(document.getElementById("join-room-id").value);
    const password = document.getElementById("join-password").value;

    if (!roomId)   { showError("join-error", "L'identifiant de la room est obligatoire."); return; }
    if (!password) { showError("join-error", "Le mot de passe est obligatoire."); return; }

    setLoading("btn-join", true);
    try {
      const res  = await fetch(`/api/rooms/${encodeURIComponent(roomId)}/join`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ password, username }),
      });
      const data = await res.json();
      if (!res.ok) { showError("join-error", data.error || "Room introuvable ou mot de passe incorrect."); return; }

      storeSession(roomId, data.token, data.salt, password, username);
      location.href = "/room/" + roomId;
    } catch {
      showError("join-error", "Impossible de contacter le serveur.");
    } finally {
      setLoading("btn-join", false);
    }
  }

  function storeSession(roomId, token, salt, password, username) {
    sessionStorage.setItem("hchat_token_"    + roomId, token);
    sessionStorage.setItem("hchat_salt_"     + roomId, salt);
    sessionStorage.setItem("hchat_password_" + roomId, password);
    sessionStorage.setItem("hchat_username_" + roomId, username);
  }

  // Soumettre avec Entree
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    if (document.getElementById("panel-create").classList.contains("active")) createRoom();
    else joinRoom();
  });
</script>
</body>
</html>
